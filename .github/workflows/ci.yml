name: CI

on:
  push:
    branches: [main]
    tags: ['v[0-9]*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Lint and Format (Ruff)
        run: |
          uvx ruff check
          uvx ruff format --check

  publish:
    needs: lint
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write 
      contents: read
      
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
