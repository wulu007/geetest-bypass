name: Publish Voice Package

on:
  push:
    tags: ['voice-v*']

permissions:
  id-token: write
  contents: read

jobs:
  publish-voice:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Build voice package
        run: uv build extensions/wulu-geetest-bypass-voice

      - name: Publish to PyPI
        run: uv publish
